<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>宁夏钢铁（集团）有限责任公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: #fff;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* 手机：全屏无白边 */
        img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 电脑：居中 + 左右留白 */
        @media (min-width: 768px) {
            html, body {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding: 20px;
            }
            img {
                width: auto;
                max-width: 90%;
                max-height: 95vh;
            }
        }
    </style>
</head>
<body>
    <img src="5-G26041112.jpg" alt="宁夏钢铁（集团）有限责任公司">
</body>
</html>
